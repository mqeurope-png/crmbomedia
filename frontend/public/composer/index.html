<title>Bomedia Email Composer Â· v4 (AI agent)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    /* Base neutrals â€” warm slate */
    --bg:         #f7f6f3;
    --bg-panel:   #ffffff;
    --bg-sunken:  #f1efea;
    --bg-hover:   #ecebe5;
    --bg-inverse: #1a1918;
    --border:     #e6e3db;
    --border-strong: #d4d0c4;
    --text:       #1a1918;
    --text-muted: #6b6960;
    --text-subtle:#9c9a91;

    /* Brand accents â€” quieter, unified chroma */
    --artisjet: oklch(55% 0.18 255);
    --mbo:      oklch(55% 0.18 295);
    --mbo_dtf:  oklch(60% 0.22 0);
    --pimpam:   oklch(63% 0.17 45);
    --flux:     oklch(62% 0.13 210);
    --bomedia:  oklch(45% 0.02 80);

    /* Primary accent for app */
    --accent:    oklch(48% 0.14 85);   /* warm olive-ochre */
    --accent-soft: oklch(95% 0.03 85);
    --accent-ink:  oklch(25% 0.06 85);

    --danger:    oklch(55% 0.18 25);
    --success:   oklch(55% 0.13 150);

    /* Radii */
    --r-xs: 4px;
    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 20px;

    /* Shadows */
    --sh-sm: 0 1px 2px rgba(26,25,24,0.04), 0 0 0 1px rgba(26,25,24,0.04);
    --sh-md: 0 2px 6px rgba(26,25,24,0.06), 0 0 0 1px rgba(26,25,24,0.05);
    --sh-lg: 0 12px 40px rgba(26,25,24,0.14), 0 0 0 1px rgba(26,25,24,0.04);

    /* Type */
    --font-sans: "Geist", -apple-system, system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, Menlo, monospace;
    --font-serif: "Instrument Serif", Georgia, serif;
  }

  /* Warm theme variant */
  [data-theme="warm"] {
    --bg: #fbf7f0;
    --bg-panel: #ffffff;
    --bg-sunken: #f3ede0;
    --bg-hover: #ede5d2;
    --border: #e5dcc6;
    --border-strong: #d4c8a8;
    --accent: oklch(55% 0.15 55);
    --accent-soft: oklch(95% 0.04 55);
  }
  /* Minimal cool variant */
  [data-theme="cool"] {
    --bg: #f5f7fa;
    --bg-panel: #ffffff;
    --bg-sunken: #eef1f5;
    --bg-hover: #e4e9f0;
    --border: #dde3eb;
    --border-strong: #c5cdd8;
    --accent: oklch(52% 0.17 245);
    --accent-soft: oklch(96% 0.02 245);
  }
  /* Bold dark variant */
  [data-theme="dark"] {
    --bg: #131210;
    --bg-panel: #1c1b18;
    --bg-sunken: #0f0e0c;
    --bg-hover: #252320;
    --border: #2a2824;
    --border-strong: #3a3731;
    --text: #f5f2eb;
    --text-muted: #a8a498;
    --text-subtle: #6b675b;
    --bg-inverse: #f5f2eb;
    --accent: oklch(72% 0.16 85);
    --accent-soft: oklch(25% 0.05 85);
    --accent-ink: oklch(95% 0.06 85);
  }

  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { overflow: hidden; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  textarea { resize: none; }

  /* Utility */
  .mono { font-family: var(--font-mono); }
  .serif { font-family: var(--font-serif); font-style: italic; }

  /* Focus */
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: var(--r-sm);
  }

  /* SCROLL */
  .scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  .scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  /* â”€â”€â”€â”€â”€ APP SHELL â”€â”€â”€â”€â”€ */
  .app-shell {
    display: grid;
    grid-template-rows: 52px 1fr 28px;
    height: 100vh;
    background: var(--bg);
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 12px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .topbar-logo {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--bg-inverse);
    color: var(--bg);
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.02em;
  }
  .topbar-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .topbar-title-sub {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 4px;
    font-size: 13px;
  }
  .topbar-crumbs {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 13px;
    flex: 1;
    min-width: 0;
  }
  .topbar-crumb {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    white-space: nowrap;
  }
  .topbar-crumb.active {
    color: var(--text);
    background: var(--bg-sunken);
    font-weight: 500;
  }
  .topbar-crumb:hover:not(.active) { color: var(--text); }
  .topbar-sep { color: var(--text-subtle); font-size: 12px; }

  .topbar-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-sunken);
    border: 1px solid transparent;
    border-radius: var(--r-md);
    padding: 6px 12px;
    width: 280px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .12s;
  }
  .topbar-search:hover { border-color: var(--border); }
  .topbar-search-kbd {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 6px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  .topbar-actions { display: flex; align-items: center; gap: 6px; }
  .lang-pill {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-sunken);
    border-radius: var(--r-md);
    padding: 2px;
  }
  .lang-pill button {
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 6px;
    letter-spacing: 0.02em;
    transition: all .12s;
  }
  .lang-pill button.active {
    background: var(--bg-panel);
    color: var(--text);
    box-shadow: var(--sh-sm);
  }

  .icon-btn {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: var(--r-sm);
    color: var(--text-muted);
    transition: all .12s;
  }
  .icon-btn:hover { background: var(--bg-sunken); color: var(--text); }
  .icon-btn.active { background: var(--bg-sunken); color: var(--text); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 500;
    transition: all .12s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--bg-inverse);
    color: var(--bg);
  }
  .btn-primary:hover { opacity: .9; }
  .btn-ghost {
    color: var(--text-muted);
  }
  .btn-ghost:hover { background: var(--bg-sunken); color: var(--text); }
  .btn-outline {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--bg-sunken); border-color: var(--border-strong); }
  .btn-accent {
    background: var(--accent);
    color: white;
  }
  [data-theme="dark"] .btn-accent { color: var(--bg); }
  .btn-accent:hover { filter: brightness(1.05); }

  /* Main layout â€” right panel width is driven by --right-panel-w (set in JS,
     persisted to localStorage). Default 560 so the email design width
     (620px) shows almost without scaling. */
  .main {
    display: grid;
    grid-template-columns: 300px 1fr var(--right-panel-w, 560px);
    min-height: 0;
    gap: 0;
  }
  .main.preview-hidden { grid-template-columns: 300px 1fr 0; }
  .main.sidebar-collapsed { grid-template-columns: 56px 1fr var(--right-panel-w, 560px); }
  .main.sidebar-collapsed.preview-hidden { grid-template-columns: 56px 1fr 0; }

  /* Drag handle on the left edge of the right panel for resizing */
  .right-panel { position: relative; }
  .right-panel-resizer {
    position: absolute;
    left: -4px;
    top: 0;
    bottom: 0;
    width: 8px;
    cursor: col-resize;
    z-index: 5;
    background: transparent;
    transition: background .15s;
  }
  .right-panel-resizer:hover,
  .right-panel-resizer.dragging {
    background: color-mix(in oklch, var(--accent) 30%, transparent);
  }
  .right-panel-resizer::after {
    content: '';
    position: absolute;
    left: 3px; top: 50%;
    width: 2px; height: 36px;
    transform: translateY(-50%);
    background: var(--border-strong);
    border-radius: 2px;
    opacity: 0;
    transition: opacity .15s;
  }
  .right-panel-resizer:hover::after,
  .right-panel-resizer.dragging::after { opacity: 1; }
  body.resizing-panel { cursor: col-resize !important; user-select: none; }
  body.resizing-panel * { cursor: col-resize !important; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .sidebar-body { flex: 1; padding: 8px; min-height: 0; }

  /* Sidebar collapsed (icon rail) */
  .sidebar-rail {
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .rail-btn {
    width: 40px; height: 40px;
    display: grid; place-items: center;
    border-radius: var(--r-md);
    color: var(--text-muted);
    position: relative;
  }
  .rail-btn.active { background: var(--bg-sunken); color: var(--text); }
  .rail-btn:hover { background: var(--bg-hover); color: var(--text); }

  /* Section tabs (compact) */
  .nav-tabs {
    display: flex;
    background: var(--bg-sunken);
    border-radius: var(--r-md);
    padding: 3px;
    margin: 0 8px 10px;
    gap: 2px;
  }
  .nav-tab {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 6px;
    transition: all .12s;
    text-align: center;
  }
  .nav-tab.active {
    background: var(--bg-panel);
    color: var(--text);
    box-shadow: var(--sh-sm);
  }

  /* Search within sidebar */
  .local-search {
    position: relative;
    margin: 0 8px 8px;
  }
  .local-search input {
    width: 100%;
    background: var(--bg-sunken);
    border: 1px solid transparent;
    border-radius: var(--r-md);
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    outline: none;
    transition: border-color .12s;
  }
  .local-search input:focus { border-color: var(--border-strong); background: var(--bg-panel); }
  .local-search svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  /* Brand filter chips */
  .brand-chips {
    display: flex;
    gap: 4px;
    padding: 0 8px 10px;
    flex-wrap: wrap;
  }
  .brand-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-sunken);
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .brand-chip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .brand-chip.active {
    background: var(--text);
    color: var(--bg);
  }
  [data-theme="dark"] .brand-chip.active { background: var(--accent); color: var(--bg); }

  /* Secondary filter chips (type / price) â€” slimmer, lower contrast than brand chips */
  .filter-row {
    display: flex;
    gap: 4px;
    padding: 0 8px 8px;
    flex-wrap: wrap;
  }
  .filter-row-label {
    width: 100%;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    margin-bottom: 2px;
    padding: 0 2px;
  }
  .filter-chip {
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
  }
  .filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .filter-chip.active {
    background: var(--bg-inverse);
    border-color: var(--bg-inverse);
    color: var(--bg);
  }
  [data-theme="dark"] .filter-chip.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  /* Block group */
  .group {
    margin-bottom: 6px;
  }
  .group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    user-select: none;
  }
  .group-header .count {
    margin-left: auto;
    font-family: var(--font-mono);
    color: var(--text-subtle);
    font-weight: 400;
  }

  /* Library item */
  .lib-item {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-md);
    cursor: grab;
    margin: 0 4px 2px;
    transition: background .12s;
    width: calc(100% - 8px);
    text-align: left;
  }
  .lib-item:hover { background: var(--bg-sunken); }
  .lib-item:active { cursor: grabbing; }
  .lib-icon {
    width: 36px; height: 36px;
    border-radius: var(--r-sm);
    display: grid; place-items: center;
    background: var(--bg-sunken);
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
  }
  .lib-icon.artisjet { background: color-mix(in oklch, var(--artisjet) 15%, transparent); color: var(--artisjet); }
  .lib-icon.mbo { background: color-mix(in oklch, var(--mbo) 15%, transparent); color: var(--mbo); }
  .lib-icon.mbo_dtf { background: color-mix(in oklch, var(--mbo_dtf) 15%, transparent); color: var(--mbo_dtf); }
  .lib-icon.pimpam { background: color-mix(in oklch, var(--pimpam) 15%, transparent); color: var(--pimpam); }
  .lib-icon.flux { background: color-mix(in oklch, var(--flux) 15%, transparent); color: var(--flux); }
  .lib-icon.smartjet { background: color-mix(in oklch, oklch(60% 0.12 180) 15%, transparent); color: oklch(45% 0.12 180); }
  .lib-icon.mix { background: var(--bg-sunken); }
  .lib-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lib-sub {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Per-item meta row (brand chip + badge) */
  .lib-meta {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .lib-brand-tag {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    border-radius: 999px;
    background: var(--bg-sunken);
    color: var(--text-muted);
    line-height: 1.4;
  }
  .lib-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 1px 6px;
    border-radius: 999px;
    line-height: 1.4;
  }
  /* Color tag (composed-block dot, before title) */
  .lib-color-tag {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .lib-color-tag.blue   { background: oklch(60% 0.18 255); }
  .lib-color-tag.purple { background: oklch(60% 0.18 295); }
  .lib-color-tag.orange { background: oklch(65% 0.17 45);  }
  .lib-color-tag.gray   { background: oklch(70% 0.02 250); }
  .lib-color-tag.teal   { background: oklch(60% 0.12 180); }

  .lib-add {
    width: 24px; height: 24px;
    border-radius: 6px;
    color: var(--text-subtle);
    display: grid; place-items: center;
    opacity: 0;
    transition: opacity .12s;
  }
  .lib-item:hover .lib-add { opacity: 1; }
  .lib-add:hover { background: var(--bg-panel); color: var(--text); }

  /* Canvas */
  .canvas {
    padding: 24px;
    min-height: 0;
    background: var(--bg);
  }
  .canvas-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .canvas-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .canvas-title {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .canvas-title-plain {
    font-family: var(--font-sans);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .canvas-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
  }
  .canvas-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-subtle); }
  .sync-ok { color: var(--success); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px 40px;
    color: var(--text-muted);
  }
  .empty-ill {
    width: 96px; height: 96px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: repeating-linear-gradient(45deg, var(--bg-sunken) 0 8px, transparent 8px 16px);
    display: grid;
    place-items: center;
    border: 1px dashed var(--border-strong);
  }
  .empty-title {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .empty-sub { font-size: 13px; }
  .empty-templates {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin: 24px auto 0;
    max-width: 600px;
    text-align: left;
  }
  .empty-tpl {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px;
    background: var(--bg-panel);
    cursor: pointer;
    transition: border-color .12s, transform .12s, box-shadow .12s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .empty-tpl:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--sh-md);
  }
  .empty-tpl-bar {
    width: 24px; height: 3px;
    border-radius: 2px;
    background: var(--text-subtle);
  }
  .empty-tpl-bar.blue   { background: oklch(60% 0.18 255); }
  .empty-tpl-bar.purple { background: oklch(60% 0.18 295); }
  .empty-tpl-bar.orange { background: oklch(65% 0.17 45);  }
  .empty-tpl-bar.gray   { background: oklch(70% 0.02 250); }
  .empty-tpl-bar.teal   { background: oklch(60% 0.12 180); }
  .empty-tpl-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .empty-tpl-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .empty-tpl-meta {
    font-size: 10px;
    color: var(--text-subtle);
    font-family: var(--font-mono);
    margin-top: auto;
  }
  .empty-divider {
    margin: 20px auto;
    max-width: 320px;
    color: var(--text-subtle);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .empty-divider::before, .empty-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Block card in canvas */
  .block {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .12s, box-shadow .12s;
    position: relative;
    cursor: pointer;
  }
  [data-theme="dark"] .edit-btn[style*="var(--accent)"] { color: var(--bg) !important; }
  .block:hover { border-color: var(--border-strong); box-shadow: var(--sh-sm); }
  .block.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  /* Drag-drop reorder visual feedback. The bar shows where the dragged
     block will land â€” top edge = insert before; bottom edge = insert after. */
  .block.drop-top { box-shadow: 0 -3px 0 0 var(--accent), var(--sh-sm); }
  .block.drop-bottom { box-shadow: 0 3px 0 0 var(--accent), var(--sh-sm); }
  /* Sections need overflow:visible so the "+ AÃ±adir a columna" popover and
     any other absolutely-positioned children can render outside the block's
     border without being clipped. */
  .block.section-block { overflow: visible; }
  .section-cols, .section-col { overflow: visible; }
  .block-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-sunken);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .block-handle {
    color: var(--text-subtle);
    cursor: grab;
    display: grid; place-items: center;
    width: 20px; height: 20px;
  }
  .block-handle:active { cursor: grabbing; }
  .block-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg-panel);
    color: var(--text-muted);
    font-weight: 500;
    font-size: 11px;
    border: 1px solid var(--border);
  }
  .block-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
  .block-bar-actions { margin-left: auto; display: flex; gap: 2px; }
  .block-action {
    width: 24px; height: 24px;
    border-radius: 5px;
    color: var(--text-subtle);
    display: grid; place-items: center;
    transition: all .12s;
  }
  .block-action:hover { background: var(--bg-panel); color: var(--text); }
  .block-action:disabled { opacity: 0.3; cursor: default; }
  .block-action.danger:hover { color: var(--danger); background: color-mix(in oklch, var(--danger) 12%, transparent); }
  .block-body { padding: 14px 16px; }

  /* Text block */
  .block-text textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    font-family: inherit;
    outline: none;
    min-height: 60px;
  }
  .block-text textarea::placeholder { color: var(--text-subtle); font-style: italic; }

  /* Product block preview */
  .prod-card {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 14px;
    align-items: start;
  }
  .prod-img {
    width: 96px; height: 96px;
    border-radius: var(--r-md);
    background: var(--bg-sunken);
    object-fit: contain;
    padding: 6px;
    border: 1px solid var(--border);
  }
  .prod-info { min-width: 0; }
  .prod-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .prod-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .prod-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }
  .prod-meta-item {
    padding: 2px 7px;
    background: var(--bg-sunken);
    border-radius: 4px;
  }
  .prod-price {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .prod-select {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  .prod-select select {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    border-radius: var(--r-sm);
    padding: 5px 8px;
    font-size: 12px;
    outline: none;
  }

  /* Insert zone â€” always visible (low opacity), expands on hover */
  .insert-zone {
    height: 22px;
    position: relative;
    display: grid;
    place-items: center;
    opacity: 0.55;
    transition: opacity .12s, height .12s;
  }
  .insert-zone:hover { opacity: 1; height: 36px; }
  .insert-zone::before {
    content: '';
    position: absolute;
    inset: 50% 8px;
    height: 1px;
    background: var(--border-strong);
    transition: background .12s;
  }
  .insert-zone:hover::before { background: var(--accent); }
  .insert-btn {
    position: relative;
    background: var(--bg-panel);
    color: var(--text-subtle);
    border: 1px solid var(--border-strong);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px;
    font-weight: 400;
    line-height: 1;
    transition: background .12s, color .12s, border-color .12s;
  }
  .insert-zone:hover .insert-btn {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  [data-theme="dark"] .insert-zone:hover .insert-btn { color: var(--bg); }

  /* Dropdown menu (canvas-header HTML button) */
  .dropdown-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    box-shadow: var(--sh-md);
    min-width: 220px;
    padding: 4px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    width: 100%;
  }
  .dropdown-item:hover { background: var(--bg-sunken); }
  .dropdown-item:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Inline toast in the canvas */
  .canvas-toast {
    position: fixed;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-inverse);
    color: var(--bg);
    padding: 9px 14px;
    border-radius: var(--r-md);
    font-size: 12px;
    font-weight: 500;
    z-index: 60;
    box-shadow: var(--sh-md);
    animation: toast-in 0.18s ease-out;
    pointer-events: none;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 6px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Full-screen preview modal */
  .preview-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .preview-modal {
    width: min(960px, 100%);
    height: min(900px, 100%);
    background: var(--bg-sunken);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .preview-modal-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .preview-modal-body {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative; /* anchor para el toast del modal */
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Topbar user badge */
  .topbar-user {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px 4px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg-panel);
    margin-left: 6px;
  }
  .topbar-user-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-subtle);
  }
  .topbar-user-dot.admin { background: var(--mbo); }
  .topbar-user-dot.commercial { background: var(--artisjet); }
  .topbar-user-name { font-weight: 500; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Login overlay */
  .login-overlay {
    backdrop-filter: blur(10px);
    background: color-mix(in oklch, var(--bg-inverse) 70%, transparent);
  }
  .login-modal {
    width: min(380px, 92vw);
  }
  .login-modal h2 { letter-spacing: -0.01em; }

  /* Per-card visibility eye button */
  .card-visibility-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    z-index: 2;
    transition: all .12s;
    box-shadow: var(--sh-sm);
  }
  .card-visibility-btn:hover {
    color: var(--text);
    border-color: var(--border-strong);
  }
  .card-visibility-btn.inline {
    position: static;
    box-shadow: none;
  }
  .product-card.hidden-for-user {
    opacity: 0.55;
  }
  .product-card.hidden-for-user .card-visibility-btn {
    color: var(--text-subtle);
    background: var(--bg-sunken);
  }
  .product-card.hidden-for-user:hover { opacity: 0.85; }

  /* Inline editor (canvas) for text blocks when selected */
  .block-text.inline-edit {
    padding: 4px 0;
  }
  .inline-edit-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .block-text-rich {
    line-height: 1.55;
    color: var(--text);
  }
  .block-text-rich p { margin: 0 0 8px; }
  .block-text-rich p:last-child { margin-bottom: 0; }
  .block-text-rich h1 { font-size: 20px; font-weight: 700; margin: 8px 0; }
  .block-text-rich h2 { font-size: 17px; font-weight: 700; margin: 8px 0; }
  .block-text-rich h3 { font-size: 15px; font-weight: 700; margin: 8px 0; }
  .block-text-rich ul, .block-text-rich ol { margin: 8px 0; padding-left: 22px; }
  .block-text-rich a { color: var(--accent); text-decoration: underline; }

  /* AI popover (over the inspector when user clicks "IA") */
  .ai-popover-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    z-index: 250;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(3px);
  }
  .ai-popover {
    width: min(540px, 100%);
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    box-shadow: var(--sh-lg);
    overflow: hidden;
  }
  .ai-popover-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: color-mix(in oklch, var(--accent) 8%, var(--bg-panel));
  }
  .ai-result { display: flex; flex-direction: column; }

  /* Banner shown above canvas-header when editing a template */
  .tpl-mode-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    background: color-mix(in oklch, var(--accent) 12%, var(--bg-panel));
    border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border));
    border-radius: var(--r-md);
    font-size: 12px;
    color: var(--text);
  }
  .tpl-mode-banner strong { font-weight: 600; }

  /* Quick-add pill at bottom of canvas */
  .quick-add {
    margin-top: 16px;
    padding: 14px;
    background: var(--bg-panel);
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .12s;
  }
  .quick-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  /* Preview panel */
  .preview {
    background: var(--bg-sunken);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .preview-header {
    padding: 10px 16px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .preview-tabs {
    display: flex;
    background: var(--bg-sunken);
    border-radius: var(--r-sm);
    padding: 2px;
  }
  .preview-tab {
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 4px;
  }
  .preview-tab.active {
    background: var(--bg-panel);
    color: var(--text);
    box-shadow: var(--sh-sm);
  }
  .device-toggle {
    display: flex;
    gap: 2px;
    margin-left: auto;
  }
  .preview-meta {
    padding: 8px 16px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }
  .preview-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .preview-frame {
    background: white;
    border-radius: var(--r-md);
    box-shadow: var(--sh-md);
    overflow: hidden;
    width: 100%;
    max-width: 620px;
    transition: max-width .2s;
  }
  .preview-frame.mobile { max-width: 380px; }

  /* Footer */
  .footer {
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }
  .footer .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border-strong); }
  .footer .status {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .footer .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--success) 20%, transparent);
  }

  /* Command palette (Cmd+K) */
  .cmdk-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,25,24,0.4);
    backdrop-filter: blur(4px);
    display: grid;
    place-items: start center;
    padding-top: 15vh;
    z-index: 1000;
  }
  .cmdk {
    width: 600px;
    max-width: 90vw;
    background: var(--bg-panel);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-lg);
    overflow: hidden;
  }
  .cmdk-input {
    width: 100%;
    border: none;
    padding: 18px 20px;
    font-size: 15px;
    background: transparent;
    outline: none;
    border-bottom: 1px solid var(--border);
  }
  .cmdk-input::placeholder { color: var(--text-subtle); }
  .cmdk-scopes {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    background: var(--bg-sunken);
  }
  .cmdk-scope {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .cmdk-scope:hover { border-color: var(--border-strong); color: var(--text); }
  .cmdk-scope.active {
    background: var(--bg-inverse);
    border-color: var(--bg-inverse);
    color: var(--bg);
  }
  [data-theme="dark"] .cmdk-scope.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .cmdk-scope-count {
    font-size: 9.5px;
    font-family: var(--font-mono);
    opacity: 0.7;
  }
  .cmdk-body { max-height: 400px; overflow-y: auto; padding: 6px; }
  .cmdk-group { margin-bottom: 8px; }
  .cmdk-group-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    padding: 8px 12px 4px;
  }
  .cmdk-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: var(--r-sm);
    cursor: pointer;
    width: 100%;
    text-align: left;
  }
  .cmdk-item:hover, .cmdk-item.active { background: var(--bg-sunken); }
  .cmdk-item-icon {
    width: 28px; height: 28px;
    border-radius: var(--r-sm);
    background: var(--bg-sunken);
    display: grid; place-items: center;
    color: var(--text-muted);
  }
  .cmdk-item.active .cmdk-item-icon { background: var(--bg-panel); }
  .cmdk-item-title { font-size: 13px; font-weight: 500; flex: 1; }
  .cmdk-item-sub { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  /* Backoffice */
  .bo-shell {
    display: grid;
    grid-template-columns: 220px 1fr;
    flex: 1;
    min-height: 0;
    background: var(--bg);
  }
  .bo-nav {
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 12px 8px;
    overflow-y: auto;
  }
  .bo-nav-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    padding: 4px 12px 8px;
  }
  .bo-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1px;
    transition: all .12s;
    width: 100%;
    text-align: left;
  }
  .bo-nav-item:hover { background: var(--bg-sunken); color: var(--text); }
  .bo-nav-item.active {
    background: var(--accent-soft);
    color: var(--accent-ink);
    font-weight: 500;
  }
  [data-theme="dark"] .bo-nav-item.active { color: var(--accent); }
  .bo-nav-item .count {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-subtle);
  }

  .bo-main { overflow-y: auto; padding: 24px 32px; }
  .bo-main-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .bo-title {
    font-family: var(--font-serif);
    font-size: 32px;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .bo-subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

  .bo-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .bo-search {
    flex: 1;
    max-width: 320px;
    position: relative;
  }
  .bo-search input {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    outline: none;
  }
  .bo-search input:focus { border-color: var(--border-strong); }
  .bo-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .product-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    transition: all .15s;
    cursor: pointer;
    position: relative;
  }
  .product-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--sh-md);
    transform: translateY(-2px);
  }
  .product-card-img {
    aspect-ratio: 16/10;
    background: var(--bg-sunken);
    display: grid; place-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .product-card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .product-card-badge {
    position: absolute;
    top: 10px; left: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .product-card-body { padding: 14px; }
  .product-card-brand {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .product-card-brand.artisjet { color: var(--artisjet); }
  .product-card-brand.mbo { color: var(--mbo); }
  .product-card-brand.mbo_dtf { color: var(--mbo_dtf); }
  .product-card-brand.pimpam { color: var(--pimpam); }
  .product-card-brand.flux { color: var(--flux); }
  .product-card-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .product-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .product-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }
  .product-card-footer .price {
    color: var(--text);
    font-weight: 500;
  }

  /* â”€â”€â”€â”€â”€ Inspector (edit panel) â”€â”€â”€â”€â”€ */
  .inspector {
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .inspector-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .inspector-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .inspector-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .inspector-sub {
    font-size: 10px;
    color: var(--text-subtle);
    margin-top: 1px;
  }
  .inspector-lang {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-sunken);
    border-bottom: 1px solid var(--border);
  }
  .inspector-lang-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .inspector-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  /* "Only overrides" toggle row at top of body */
  .insp-overrides-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }
  .insp-overrides-bar .toggle { padding: 0; }
  .insp-overrides-bar .toggle .toggle-label { font-size: 11px; }
  .insp-overrides-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-subtle);
    padding: 2px 6px;
    background: var(--bg-sunken);
    border-radius: 999px;
  }
  /* Backoffice jump CTA inside ComposedEditor */
  .insp-bo-cta {
    margin: 12px;
    padding: 12px;
    background: color-mix(in oklch, var(--accent) 8%, var(--bg-panel));
    border: 1px solid color-mix(in oklch, var(--accent) 30%, var(--border));
    border-radius: var(--r-md);
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .insp-bo-cta .btn {
    align-self: flex-start;
    font-size: 11px;
    padding: 6px 10px;
  }
  .inspector-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    background: var(--bg-sunken);
  }
  .inspector-footer .btn { flex: 1; justify-content: center; font-size: 12px; }
  .inspector-footer .btn.danger:hover { color: var(--danger); background: color-mix(in oklch, var(--danger) 10%, transparent); }

  /* Inspector sections */
  .insp-section {
    border-bottom: 1px solid var(--border);
  }
  .insp-section:last-child { border-bottom: none; }
  .insp-section-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-align: left;
  }
  .insp-section-header:hover { color: var(--text); }
  .insp-section-body {
    padding: 0 14px 14px;
  }

  /* Fields */
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field-label-row {
    display: flex; align-items: center;
    margin-bottom: 5px;
  }
  .field-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .field-hint {
    font-size: 10px;
    color: var(--text-subtle);
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .field-reset {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .field-reset:hover { color: var(--text); background: var(--bg-sunken); }
  .ai-btn, .field-reset.ai-btn {
    color: var(--accent-ink);
    background: var(--accent-soft);
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  [data-theme="dark"] .ai-btn { color: var(--accent); }
  .ai-btn:hover { filter: brightness(0.95); }

  .input, .textarea, .select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 7px 10px;
    font-size: 13px;
    background: var(--bg-panel);
    outline: none;
    transition: border-color .12s;
    color: var(--text);
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .textarea {
    font-family: inherit;
    line-height: 1.5;
    min-height: 60px;
  }
  .input.mono, .textarea.mono { font-family: var(--font-mono); }

  .char-count {
    font-size: 10px;
    color: var(--text-subtle);
    margin-top: 3px;
    text-align: right;
  }

  /* Variables chips */
  .var-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .var-chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg-sunken);
    color: var(--text-muted);
    border: 1px dashed var(--border-strong);
    transition: all .12s;
  }
  .var-chip:hover {
    background: var(--accent-soft);
    color: var(--accent-ink);
    border-color: var(--accent);
    border-style: solid;
  }

  /* Segmented control */
  .seg {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    background: var(--bg-sunken);
    padding: 2px;
    border-radius: var(--r-sm);
    gap: 2px;
  }
  .seg-btn {
    padding: 5px 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 4px;
    text-align: center;
  }
  .seg-btn.active {
    background: var(--bg-panel);
    color: var(--text);
    box-shadow: var(--sh-sm);
  }

  /* Toggle */
  .toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    width: 100%;
    text-align: left;
    font-size: 13px;
    color: var(--text);
  }
  .toggle-track {
    width: 30px; height: 18px;
    background: var(--border-strong);
    border-radius: 999px;
    position: relative;
    flex-shrink: 0;
    transition: background .15s;
  }
  .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    transition: left .15s;
  }
  .toggle.on .toggle-track { background: var(--accent); }
  .toggle.on .toggle-thumb { left: 14px; }
  .toggle-label { font-size: 13px; color: var(--text); }

  /* Product mini preview */
  .prod-preview-mini {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 10px;
    padding: 10px;
    background: var(--bg-sunken);
    border-radius: var(--r-sm);
    margin-top: 8px;
    align-items: center;
  }
  .prod-preview-mini img {
    width: 60px; height: 60px;
    object-fit: contain;
    background: var(--bg-panel);
    padding: 4px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .prod-preview-brand {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .prod-preview-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  /* Swatches */
  .swatch-row { display: flex; gap: 6px; }
  .swatch {
    width: 28px; height: 28px;
    border-radius: var(--r-sm);
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: transform .1s;
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active {
    border-color: var(--text);
    box-shadow: 0 0 0 1px var(--bg-panel) inset;
  }

  /* AI actions */
  .ai-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .ai-action {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    font-size: 11px;
    background: var(--accent-soft);
    color: var(--accent-ink);
    border-radius: var(--r-sm);
    font-weight: 500;
    transition: all .12s;
  }
  [data-theme="dark"] .ai-action { color: var(--accent); }
  .ai-action:hover { filter: brightness(0.97); transform: translateY(-1px); }

  /* Right panel mode toggle (tabs on top of preview/inspector) */
  .right-mode {
    display: flex;
    padding: 8px 8px 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    gap: 4px;
    border-left: 1px solid var(--border);
  }
  .right-mode-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 6px 6px 0 0;
    position: relative;
    top: 1px;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .right-mode-btn.active {
    background: var(--bg-panel);
    color: var(--text);
    border-color: var(--border);
  }

  /* Improved block selection */
  .block.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft), var(--sh-md);
  }
  .block.selected .block-bar {
    background: var(--accent-soft);
  }
  [data-theme="dark"] .block.selected .block-bar { background: color-mix(in oklch, var(--accent) 15%, var(--bg-sunken)); }
  .block-edit-hint {
    position: absolute;
    top: -10px;
    right: 14px;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-family: var(--font-mono);
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    pointer-events: none;
    box-shadow: var(--sh-sm);
  }
  [data-theme="dark"] .block-edit-hint { color: var(--bg); }

  /* Backoffice drawer */
  .bo-drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(26,25,24,0.35);
    backdrop-filter: blur(2px);
    z-index: 500;
    animation: fadeIn .15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .bo-drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 540px;
    max-width: 94vw;
    background: var(--bg-panel);
    box-shadow: -8px 0 40px rgba(0,0,0,0.12);
    z-index: 501;
    display: flex;
    flex-direction: column;
    animation: slideIn .2s;
  }
  /* Wide variant — para editar plantillas y bloques compuestos con
     split editor + preview en vivo. Misma altura/posición pero mucho
     más ancho. */
  .bo-drawer.wide {
    width: min(1280px, 96vw);
  }
  .bo-drawer-split {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    overflow: hidden;
    min-height: 0;
  }
  .bo-drawer-pane-editor {
    overflow-y: auto;
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }
  .bo-drawer-pane-preview {
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-sunken);
  }
  .bo-drawer-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bo-drawer-title {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .bo-drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .bo-drawer-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-sunken);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed;
    width: 260px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-lg);
    z-index: 100;
    user-select: none;
  }
  .tweaks-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px 8px 12px;
    border-bottom: 1px solid var(--border);
    cursor: grab;
  }
  .tweaks-head:active { cursor: grabbing; }
  .tweaks-head-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    flex: 1;
  }
  .tweaks-head-btn {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    color: var(--text-subtle);
    border-radius: 4px;
  }
  .tweaks-head-btn:hover { background: var(--bg-sunken); color: var(--text); }
  .tweaks-content {
    padding: 14px;
  }
  .tweaks.minimized .tweaks-content { display: none; }
  .tweaks.minimized {
    width: auto;
  }
  .tweaks-fab {
    position: fixed;
    bottom: 46px;
    right: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    box-shadow: var(--sh-md);
    display: grid; place-items: center;
    color: var(--text-muted);
    z-index: 100;
    cursor: pointer;
    transition: all .15s;
  }
  .tweaks-fab:hover {
    color: var(--text);
    transform: scale(1.05);
  }
  .tweaks-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .tweaks-group { margin-bottom: 12px; }
  .tweaks-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .tweaks-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .tweaks-opt {
    padding: 8px 4px;
    text-align: center;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--text-muted);
    transition: all .12s;
    background: var(--bg-panel);
    cursor: pointer;
  }
  .tweaks-opt.active {
    border-color: var(--text);
    color: var(--text);
    font-weight: 500;
    background: var(--bg-sunken);
  }
  .tweaks-row.two { grid-template-columns: 1fr 1fr; }

  /* Brand strip preview block */
  .brand-strip-preview {
    display: flex;
    gap: 16px;
    padding: 12px;
    background: var(--bg-sunken);
    border-radius: var(--r-sm);
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
  }
  .brand-strip-preview > * { padding: 4px 8px; border-radius: 4px; background: var(--bg-panel); }

  /* Hero preview block */
  .hero-preview {
    padding: 20px;
    background: linear-gradient(135deg, color-mix(in oklch, var(--pimpam) 10%, transparent), var(--bg-sunken));
    border-radius: var(--r-md);
    text-align: center;
  }
  .hero-preview-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
  .hero-preview-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .hero-preview-cta {
    display: inline-block; padding: 6px 14px; background: var(--pimpam); color: white;
    border-radius: var(--r-sm); font-size: 12px; font-weight: 500;
  }

  /* Rendered email (preview) */
  .email-rendered { font-family: -apple-system, "Segoe UI", Arial, sans-serif; color: #1a1918; }
  .email-rendered-body { padding: 28px 24px; font-size: 14px; line-height: 1.6; }
  .email-rendered p { margin: 0 0 14px; }
  .email-rendered .e-prod {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 16px;
    margin: 16px 0;
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 14px;
  }
  .email-rendered .e-prod img {
    width: 100%; height: 100px; object-fit: contain; border-radius: 6px; background: #f9fafb;
  }
  .email-rendered .e-prod-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .email-rendered .e-prod-desc { font-size: 12px; color: #6b7280; margin-bottom: 8px; line-height: 1.5; }
  .email-rendered .e-prod-price { font-size: 13px; font-weight: 700; color: #111827; }
  .email-rendered .e-prod-feat { font-size: 11px; color: #6b7280; margin-top: 4px; }
  .email-rendered .e-cta {
    display: inline-block; background: #1a1918; color: white; padding: 10px 18px;
    border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px;
  }
  .email-rendered .e-strip {
    display: flex; justify-content: space-around; align-items: center; gap: 10px;
    padding: 14px; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb;
    margin: 18px 0; flex-wrap: wrap;
  }
  .email-rendered .e-strip img { height: 24px; object-fit: contain; }
  .email-rendered .e-header {
    padding: 18px 24px; background: #1a1918; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  .email-rendered .e-header-logo { font-weight: 700; letter-spacing: -0.01em; }
  .email-rendered .e-hero {

<!--
  CRM auth bootstrap. Runs before any app-X.jsx loads.
  Reads the CRM JWT from sessionStorage (the Next.js loader at
  /composer (page.tsx) copies it from localStorage before
  redirecting here) and stashes it onto window.__CRM_TOKEN__ for
  the CRM-adapted app-supabase.jsx to read.

  Also flips __COMPOSER_AUTH_BYPASSED__ so the original login
  modal (designed for the standalone composer.bomedia.net deploy)
  stays dismissed — the CRM has already authenticated the session
  by the time the redirect lands here.
-->
<script>
(function bootstrapCrmAuth() {
  try {
    var t = window.sessionStorage.getItem('composer_crm_jwt');
    if (!t) {
      // Direct navigation — bounce back to the CRM login.
      window.location.replace('/login?next=' + encodeURIComponent('/composer'));
      return;
    }
    window.__CRM_TOKEN__ = t;
    window.__COMPOSER_AUTH_BYPASSED__ = true;
    // Expose a global helper the supabase replacement uses.
    window.__crmFetch = function (url, opts) {
      opts = opts || {};
      var headers = Object.assign({}, opts.headers || {});
      headers['Authorization'] = 'Bearer ' + window.__CRM_TOKEN__;
      if (!(opts.body instanceof FormData) && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
      }
      return fetch(url, Object.assign({}, opts, { headers: headers }));
    };
    // Synthesize a minimal currentUser injection — the embed reads
    // it before it tries Supabase auth. Real role + name come from
    // /api/composer/state once that endpoint replies.
    window.__CRM_CURRENT_USER__ = { id: 'crm', name: 'CRM', role: 'admin' };
  } catch (e) {
    console.error('[composer.bootstrap]', e);
  }
})();
</script>
