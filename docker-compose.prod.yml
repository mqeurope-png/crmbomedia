# Production stack for CRMBO Media CRM.
#
# Usage:
#   1. Copy .env.production.example to .env.production and fill in real values.
#   2. Obtain TLS certs on the host (see docs/deployment-ionos.md).
#   3. Edit deploy/nginx/conf.d/app.conf with your domain.
#   4. docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Differences vs. docker-compose.yml (development):
#   - Database and Redis are NOT exposed on the host network.
#   - DATABASE_URL, SECRET_KEY and admin credentials come from .env.production only.
#   - Nginx is the only public-facing service (80/443).
#   - Containers use restart: unless-stopped and bounded log files.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: mysql:8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  api:
    build: ./backend
    image: crmbomedia-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    image: crmbomedia-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    # Listens on every `{system}:{operation}` queue the connectors
    # define. Listing them explicitly (instead of `*`) makes it easy
    # to throttle one system independently with a second worker
    # container later on.
    # RQ default serializer (pickle) is fine because the worker shares
    # its Docker image with the api service, so producer and consumer
    # speak the same Python. `rq worker` defaults to INFO logging so
    # we don't pass --logging_level explicitly — the flag name changed
    # between rq minor versions (--logging-level vs --logging_level)
    # and silently omitting it keeps us version-agnostic.
    command:
      - rq
      - worker
      - --url
      - redis://redis:6379/0
      - agilecrm:sync_contacts
      - agilecrm:purge_quota
      - brevo:push_contact
      - brevo:webhook_process
      - freshdesk:sync_tickets
      - factusol:sync_invoices
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    image: crmbomedia-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  certbot_webroot:
