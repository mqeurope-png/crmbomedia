# Production stack for CRMBO Media CRM.
#
# Usage:
#   1. Copy .env.production.example to .env.production and fill in real values.
#   2. Obtain TLS certs on the host (see docs/deployment-ionos.md).
#   3. Edit deploy/nginx/conf.d/app.conf with your domain.
#   4. docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Differences vs. docker-compose.yml (development):
#   - Database and Redis are NOT exposed on the host network.
#   - DATABASE_URL, SECRET_KEY and admin credentials come from .env.production only.
#   - Nginx is the only public-facing service (80/443).
#   - Containers use restart: unless-stopped and bounded log files.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: mysql:8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  api:
    build: ./backend
    image: crmbomedia-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
      EMAIL_ASSETS_DIR: /opt/crmbo/uploads/email-templates
    volumes:
      # Bind mount instead of a named volume so nginx can alias the
      # same `/opt/crmbo/uploads/email-templates/` path on the host —
      # named volumes live under /var/lib/docker/volumes/ and were
      # invisible from nginx's perspective.
      - /opt/crmbo/uploads/email-templates:/opt/crmbo/uploads/email-templates
      # Sprint Backup-Hardening. `/admin/backups/{id}/download` lee
      # el archivo cifrado producido por el worker. Sin este bind, el
      # FileResponse del api 404 — el worker crea el binario en su
      # propio FS porque ambos contenedores ven el host.
      - /var/backups/crmbo:/var/backups/crmbo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker-sync:
    image: crmbomedia-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    # PR-Fix-Worker-Dedicado-Workflows. Worker A: SOLO queues de sync
    # externo + housekeeping. La queue `workflows:dispatch` se mudó al
    # worker-workflows para no quedarse en posición 22 de 24 esperando
    # eternamente — RQ procesa queues en orden de la lista, y las
    # syncs de Agile/Brevo nunca dejan idle al worker durante mucho
    # rato.
    #
    # RQ default serializer (pickle) es fine porque el worker comparte
    # imagen Docker con el api service, productor y consumidor hablan
    # el mismo Python.
    command:
      - rq
      - worker
      # --with-scheduler aplica para los heartbeats self-rescheduling
      # de Brevo (auto-sync targets + campaign cache refresh) y
      # Agile (periodic_read) via enqueue_in.
      - --with-scheduler
      - --url
      - redis://redis:6379/0
      - agilecrm:sync_contacts
      - agilecrm:purge_quota
      # PR-Fix-Scheduler-Agile-Roto. El scheduler de Agile encola su
      # heartbeat self-rescheduling en `agilecrm:periodic_read`
      # (igual que Brevo en `brevo:periodic_read`). Sin la queue en
      # esta lista los jobs se quedaban eternamente sin procesar y
      # el polling automático llevaba 2 días caído.
      - agilecrm:periodic_read
      - brevo:sync_contacts
      - brevo:push_target
      - brevo:auto_sync_check
      - brevo:push_contact
      - brevo:webhook_process
      - brevo:refresh_campaigns
      - brevo:refresh_segments
      - brevo:refresh_segment
      - brevo:periodic_read
      - brevo:periodic_segments
      - brevo:periodic_push
      - brevo:historical_backfill
      - freshdesk:sync_tickets
      - factusol:sync_invoices
      - gmail:process_history
      - gmail:renew_watches
      - emails:snooze_sweep
      - email_templates:import_gmail
      # Sprint Backup. Cola virtual para el job manual + scheduled
      # cada 72 h. `backups:create` cubre los dos caminos.
      - backups:create
    volumes:
      # Sprint Backup-Hardening. El worker ejecuta
      # `scripts/backup-crmbo.sh` via subprocess: necesita el script
      # legible (la imagen ya lo lleva via `COPY scripts ./scripts`,
      # pero exponerlo desde el host hace que actualizaciones del
      # script no requieran rebuild de la imagen).
      - /opt/crmbo/scripts:/scripts:ro
      # Destino del archivo cifrado. Compartido con el api para que
      # el endpoint /download lo encuentre.
      - /var/backups/crmbo:/var/backups/crmbo
      # El script lee MYSQL_ROOT_PASSWORD y
      # BACKUP_ENCRYPTION_PASSPHRASE del .env.production. Read-only
      # — el worker NUNCA debe modificarlo.
      - /opt/crmbo/.env.production:/opt/crmbo/.env.production:ro
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  worker-workflows:
    image: crmbomedia-api:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    # PR-Fix-Worker-Dedicado-Workflows. Worker B dedicado al motor de
    # workflows. Antes vivía en el mismo worker que las syncs y se
    # quedaba en cola de 24 queues — los 9 syncs Agile + Brevo polling
    # + gmail history + freshdesk + factusol + backups copaban al
    # worker, así que `workflows:dispatch` (posición 22) nunca tenía
    # CPU. En producción se acumularon 1380 jobs durante 6 horas; al
    # arrancar el worker en burst envió emails inesperados.
    #
    # Separar en 2 procesos: este worker SOLO ve workflows. Los
    # eventos `contact.created` dispatched desde un sync (vía
    # `dispatch_event`) los procesa en milisegundos sin esperar a que
    # el sync termine.
    command:
      - rq
      - worker
      # --with-scheduler powers `workflows:scheduler` (heartbeat
      # periódico que despierta waits + cron workflows via enqueue_in).
      - --with-scheduler
      - --url
      - redis://redis:6379/0
      # Sprint Workflows Bloque 1. Tres colas:
      # - `workflows:dispatch` — eventos entrantes (contact.created,
      #   email.opened, etc.) que evalúan workflows matching.
      # - `workflows:execute` — runs ya iniciados que avanzan step a step.
      # - `workflows:scheduler` — heartbeat periódico (cada 30 s)
      #   que despierta waits + cron workflows.
      - workflows:dispatch
      - workflows:execute
      - workflows:scheduler
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    image: crmbomedia-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      # Email-template inline images served straight off disk; read-only
      # mirror of the api container's write path. Bind mount so the
      # host path matches what the nginx alias expects.
      - /opt/crmbo/uploads/email-templates:/opt/crmbo/uploads/email-templates:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  certbot_webroot:
