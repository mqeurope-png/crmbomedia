name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Tag any error captured by Sentry with the commit that produced it.
      # The SDK only emits events when SENTRY_DSN is set at runtime.
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: python -m compileall app tests
      - run: python -m pytest

  backend-mysql:
    # Catches MySQL-only schema bugs that SQLite happily accepts.
    # Historically we shipped at least three migrations (||/concat,
    # NULLS LAST, DEFAULT on TEXT) that passed CI on SQLite and
    # broke production. This job runs the full migration chain
    # against MySQL 8 plus a minimal insert sanity check.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: crm_test
          MYSQL_USER: crm
          MYSQL_PASSWORD: crmpw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ucrm -pcrmpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql+pymysql://crm:crmpw@127.0.0.1:3306/crm_test
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -ucrm -pcrmpw --silent; then
              echo "mysql ready"; exit 0
            fi
            sleep 2
          done
          echo "mysql never came up" >&2; exit 1
      - name: Alembic upgrade head (catches DEFAULT-on-TEXT / NULLS LAST / || class of bugs)
        env:
          INTEGRATION_SECRETS_KEY: ${{ secrets.INTEGRATION_SECRETS_KEY }}
        run: |
          # Seed a throwaway key if the repo secret isn't set so the
          # smoke job works on forks/PRs without secret access.
          if [ -z "$INTEGRATION_SECRETS_KEY" ]; then
            export INTEGRATION_SECRETS_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          fi
          alembic upgrade head
      - name: Application-layer defaults round-trip on MySQL
        # The pytest suite uses in-memory SQLite by design, so we
        # script a tiny insert/select cycle through the real models
        # against the live MySQL service. This catches the case where
        # a NOT NULL column has no DB default AND the ORM forgets to
        # supply one — the exact failure mode we just shipped on
        # composer 0033.
        env:
          DATABASE_URL: mysql+pymysql://crm:crmpw@127.0.0.1:3306/crm_test
        run: |
          export INTEGRATION_SECRETS_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          python - <<'PY'
          from datetime import UTC, datetime

          from app.composer.models import (
              ComposerActivityLog,
              ComposerBrand,
              ComposerProduct,
              ComposerSettings,
          )
          from app.db.session import get_engine
          from sqlalchemy.orm import Session

          now = datetime.now(UTC)
          with Session(get_engine()) as s:
              s.add(
                  ComposerBrand(
                      id="smoke-brand",
                      type="brand",
                      label="Smoke",
                      color="#000",
                      visible=True,
                      sort_order=0,
                      created_at=now,
                      updated_at=now,
                  )
              )
              s.add(
                  ComposerProduct(
                      id="smoke-product",
                      brand_id="smoke-brand",
                      name="Smoke product",
                      img="https://example/x.png",
                      visible=True,
                      sort_order=0,
                      created_at=now,
                      updated_at=now,
                  )
              )
              s.add(
                  ComposerSettings(
                      id=1,
                      openai_api_key_encrypted=None,
                      agent_system_prompt=None,
                      updated_at=now,
                  )
              )
              s.add(
                  ComposerActivityLog(
                      user_id=None,
                      action="smoke",
                      entity_type=None,
                      entity_id=None,
                      created_at=now,
                  )
              )
              s.commit()
              assert s.get(ComposerBrand, "smoke-brand").i18n_json == "{}"
              assert s.get(ComposerProduct, "smoke-product").tags == "[]"
              assert s.get(ComposerSettings, 1).ai_styles_json == "{}"
          print("mysql.composer.smoke ok")
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      GIT_SHA: ${{ github.sha }}
      NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - run: npm install
      - run: npm run build
      - run: npm run lint
