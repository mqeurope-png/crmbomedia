services:
  db:
    image: mysql:8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: crm
      MYSQL_USER: crm
      MYSQL_PASSWORD: crm
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucrm", "-pcrm"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://crm:crm@db:3306/crm
      REDIS_URL: redis://redis:6379/0
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-change-me-admin-password}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      # Sprint-Backfill-Gmail. Misma carpeta que worker-sync para que
      # el endpoint de download sirva los adjuntos que el worker baja.
      - crmbo_email_attachments:/var/lib/crmbo/attachments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-sync:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://crm:crm@db:3306/crm
      REDIS_URL: redis://redis:6379/0
    # PR-Fix-Worker-Dedicado-Workflows. Worker A en dev: queues de
    # sync + housekeeping. Mismas que prod (excepto `backups:create`
    # que en dev no se monta el script). Ver
    # `docker-compose.prod.yml` para la justificación arquitectónica.
    command:
      - rq
      - worker
      # --with-scheduler powers Brevo's self-rescheduling heartbeats
      # (auto-sync targets + campaign cache refresh) via enqueue_in.
      - --with-scheduler
      - --url
      - redis://redis:6379/0
      - agilecrm:sync_contacts
      - agilecrm:purge_quota
      # PR-Fix-Scheduler-Agile-Roto.
      - agilecrm:periodic_read
      - brevo:sync_contacts
      - brevo:push_target
      - brevo:auto_sync_check
      - brevo:push_contact
      - brevo:webhook_process
      - brevo:refresh_campaigns
      - brevo:refresh_segments
      - brevo:refresh_segment
      - brevo:periodic_read
      - brevo:periodic_segments
      - brevo:periodic_push
      - brevo:historical_backfill
      - freshdesk:sync_tickets
      - factusol:sync_invoices
      - gmail:process_history
      - gmail:renew_watches
      - gmail:backfill_historic
      - emails:snooze_sweep
      - email_templates:import_gmail
    volumes:
      # Sprint-Backfill-Gmail. El worker baja los adjuntos a este volume;
      # api los sirve via FileResponse desde el mismo volume.
      - crmbo_email_attachments:/var/lib/crmbo/attachments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-workflows:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://crm:crm@db:3306/crm
      REDIS_URL: redis://redis:6379/0
    # PR-Fix-Worker-Dedicado-Workflows. Worker B en dev: motor de
    # workflows. En dev este worker no existía antes — los eventos
    # `contact.created` quedaban en Redis sin procesarse, y todos
    # los tests de workflows usaban el fallback inline. Tenerlo
    # arrancado en dev cubre el camino real (RQ enqueue + worker
    # pop) y permite reproducir el bug que vimos en prod.
    command:
      - rq
      - worker
      - --with-scheduler
      - --url
      - redis://redis:6379/0
      - workflows:dispatch
      - workflows:execute
      - workflows:scheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  # Sprint-Backfill-Gmail. Binarios de adjuntos descargados por el
  # backfill. Compartido entre api y worker-sync.
  crmbo_email_attachments:
